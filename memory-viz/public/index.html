<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧠 Memory Visualization - OpenClaw</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      overflow: hidden;
    }
    
    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    #title {
      font-size: 20px;
      font-weight: 600;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    #controls {
      display: flex;
      gap: 10px;
    }
    
    button {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    button:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-1px);
    }
    
    #viz-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    
    #viz {
      width: 100%;
      height: 100%;
    }
    
    .node circle {
      stroke: #fff;
      stroke-width: 2px;
      transition: all 0.3s;
    }
    
    .node circle:hover {
      stroke-width: 4px;
      filter: drop-shadow(0 0 10px currentColor);
    }
    
    .node text {
      font-size: 12px;
      fill: #fff;
      pointer-events: none;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }
    
    .link {
      stroke: rgba(255,255,255,0.2);
      stroke-width: 1.5px;
    }
    
    #legend {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 15px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 5px 0;
      font-size: 13px;
    }
    
    .legend-color {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid #fff;
    }
    
    #stats {
      position: fixed;
      top: 70px;
      right: 20px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 15px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 13px;
    }
    
    #stats div {
      margin: 5px 0;
    }
    
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      color: #00d9ff;
    }
  </style>
</head>
<body>
  <div id="header">
    <div id="title">🧠 Memory Visualization</div>
    <div id="controls">
      <button onclick="refreshData()">🔄 刷新</button>
      <button onclick="toggleLabels()">🏷️ 标签</button>
      <button onclick="resetZoom()">🎯 重置</button>
    </div>
  </div>
  
  <div id="viz-container">
    <div id="loading" class="loading">正在加载记忆图谱...</div>
    <svg id="viz"></svg>
  </div>
  
  <div id="stats">
    <div>📊 节点：<span id="node-count">0</span></div>
    <div>🔗 关系：<span id="link-count">0</span></div>
    <div>📁 来源：<span id="source-count">0</span></div>
  </div>
  
  <div id="legend">
    <div class="legend-item">
      <div class="legend-color" style="background: #ff6b6b;"></div>
      <span>人物 (Person)</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background: #4ecdc4;"></div>
      <span>组织 (Organization)</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background: #ffe66d;"></div>
      <span>概念 (Concept)</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background: #95e1d3;"></div>
      <span>事件 (Event)</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background: #f38181;"></div>
      <span>任务 - 待办 (Pending)</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background: #6ab04c;"></div>
      <span>任务 - 完成 (Completed)</span>
    </div>
  </div>

  <script>
    const width = window.innerWidth;
    const height = window.innerHeight;
    
    const svg = d3.select('#viz')
      .attr('width', width)
      .attr('height', height);
    
    const g = svg.append('g');
    
    // 缩放行为
    const zoom = d3.zoom()
      .scaleExtent([0.1, 4])
      .on('zoom', (event) => {
        g.attr('transform', event.transform);
      });
    
    svg.call(zoom);
    
    // 颜色映射
    const colorMap = {
      person: '#ff6b6b',
      organization: '#4ecdc4',
      concept: '#ffe66d',
      event: '#95e1d3',
      pending: '#f38181',
      completed: '#6ab04c',
      timeline: '#a8a8a8'
    };
    
    let showLabels = true;
    
    async function loadGraph() {
      try {
        const response = await fetch('/api/graph');
        const data = await response.json();
        
        document.getElementById('loading').style.display = 'none';
        document.getElementById('node-count').textContent = data.nodes.length;
        document.getElementById('link-count').textContent = data.links.length;
        
        const sources = new Set(data.nodes.map(n => n.source));
        document.getElementById('source-count').textContent = sources.size;
        
        renderGraph(data);
      } catch (error) {
        console.error('Failed to load graph:', error);
        document.getElementById('loading').textContent = '加载失败，请刷新';
      }
    }
    
    function renderGraph(data) {
      g.selectAll('*').remove();
      
      // 力导向模拟
      const simulation = d3.forceSimulation(data.nodes)
        .force('charge', d3.forceManyBody().strength(-300))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('link', d3.forceLink(data.links).id(d => d.id).distance(150))
        .force('collide', d3.forceCollide().radius(30));
      
      // 绘制连线
      const links = g.append('g')
        .selectAll('line')
        .data(data.links)
        .join('line')
        .attr('class', 'link');
      
      // 绘制节点
      const nodes = g.append('g')
        .selectAll('.node')
        .data(data.nodes)
        .join('g')
        .attr('class', 'node')
        .call(d3.drag()
          .on('start', dragstarted)
          .on('drag', dragged)
          .on('end', dragended));
      
      // 节点圆圈
      nodes.append('circle')
        .attr('r', d => {
          if (d.type === 'person') return 20;
          if (d.type === 'organization') return 18;
          if (d.type === 'concept') return 15;
          if (d.type === 'event') return 17;
          if (d.type === 'task') return 12;
          return 10;
        })
        .attr('fill', d => colorMap[d.group] || '#888');
      
      // 节点标签
      nodes.append('text')
        .attr('dx', d => d.type === 'task' ? 15 : 0)
        .attr('dy', d => d.type === 'task' ? 4 : 25)
        .attr('text-anchor', d => d.type === 'task' ? 'start' : 'middle')
        .text(d => d.label)
        .style('opacity', showLabels ? 1 : 0);
      
      // 更新节点位置
      simulation.on('tick', () => {
        links
          .attr('x1', d => d.source.x)
          .attr('y1', d => d.source.y)
          .attr('x2', d => d.target.x)
          .attr('y2', d => d.target.y);
        
        nodes.attr('transform', d => `translate(${d.x},${d.y})`);
      });
    }
    
    function dragstarted(event, d) {
      if (!event.active) simulation.alphaTarget(0.3).restart();
      d.fx = d.x;
      d.fy = d.y;
    }
    
    function dragged(event, d) {
      d.fx = event.x;
      d.fy = event.y;
    }
    
    function dragended(event, d) {
      if (!event.active) simulation.alphaTarget(0);
      d.fx = null;
      d.fy = null;
    }
    
    function refreshData() {
      document.getElementById('loading').style.display = 'block';
      loadGraph();
    }
    
    function toggleLabels() {
      showLabels = !showLabels;
      g.selectAll('.node text')
        .transition()
        .duration(200)
        .style('opacity', showLabels ? 1 : 0);
    }
    
    function resetZoom() {
      svg.transition().duration(750).call(
        zoom.transform,
        d3.zoomIdentity.translate(0, 0).scale(1)
      );
    }
    
    // 初始化
    loadGraph();
  </script>
</body>
</html>
